version: "3.8"

# Fichier de remplacement RunTipi : même nom de service "test" que le base
# pour remplacer nginx:alpine par ton image. À coller dans "fichier de remplacement".
services:
  test:
    image: michael73100/newtest:latest
    container_name: newtest_web
    restart: unless-stopped
    ports:
      - "${APP_PORT:-3030}:3030"
    labels:
      - "runtipi.app.name=Page Web Animée"
      - "runtipi.app.description=Page web moderne avec des animations JavaScript interactives"
